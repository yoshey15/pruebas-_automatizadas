plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    // JUnit 4 (requerido por Runner: @RunWith, @AfterClass; y steps: Assert)
    testImplementation 'junit:junit:4.13.2'

    // Selenium WebDriver
    testImplementation("org.seleniumhq.selenium:selenium-java:4.38.0")

    // TestNG (usado en FreeRangeTest)
    testImplementation("org.testng:testng:7.11.0")

    // Cucumber
    testImplementation("io.cucumber:cucumber-java:7.31.0")
    testImplementation("io.cucumber:cucumber-junit:7.31.0")
    testImplementation("io.cucumber:query:13.6.0")

    // WebDriverManager
    testImplementation("io.github.bonigarcia:webdrivermanager:6.3.2")
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

tasks.named('test') {
    useJUnit()
    systemProperty "cucumber.options", System.getProperty("cucumber.options")
    systemProperties System.getProperties()
}
